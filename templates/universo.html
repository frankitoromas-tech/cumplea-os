<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌌 Nuestro Universo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,300;1,400&display=swap" rel="stylesheet">
  <style>
    :root { --rosa:#ff6b81; --dorado:#f5c842; --verde:#0afab0; --texto:#e8eaff; }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body { height:100%; overflow:hidden; }
    body { background:#02040e; font-family:'Cormorant Garamond',serif; color:var(--texto); cursor:none; }

    canvas { position:fixed; inset:0; width:100%; height:100%; }

    #hud {
      position:fixed; inset:0; display:flex; flex-direction:column;
      justify-content:space-between; align-items:center;
      padding:28px 20px 80px; pointer-events:none; z-index:10;
    }
    .hud-titulo {
      font-family:'Playfair Display',serif; font-style:italic;
      font-size:clamp(1.4rem,3.5vw,2.4rem); color:rgba(255,255,255,.85);
      letter-spacing:4px; text-shadow:0 0 30px rgba(255,255,255,.2);
      animation:fadeIn 2s ease both; text-align:center;
    }
    .hud-sub {
      font-style:italic; font-size:.9rem; color:var(--rosa);
      letter-spacing:2px; margin-top:6px;
      animation:fadeIn 2s .4s ease both; opacity:0;
    }
    .hud-hint {
      font-style:italic; font-size:.82rem; color:rgba(255,255,255,.35);
      letter-spacing:1px; text-align:center;
      animation:fadeIn 2s 1.2s ease both; opacity:0;
    }
    @keyframes fadeIn {
      from { opacity:0; transform:translateY(-12px); }
      to   { opacity:1; transform:translateY(0); }
    }

    #panelStats {
      position:fixed; top:50%; right:22px; transform:translateY(-50%);
      display:flex; flex-direction:column; gap:12px;
      pointer-events:none; z-index:10;
      animation:fadeIn 2s 1.5s ease both; opacity:0;
    }
    .chip {
      background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1);
      border-radius:12px; padding:10px 16px; text-align:right;
      backdrop-filter:blur(8px); min-width:138px;
    }
    .chip .val { font-family:'Playfair Display',serif; font-size:1.25rem; color:var(--dorado); display:block; }
    .chip .lbl { font-size:.7rem; color:rgba(255,255,255,.45); letter-spacing:1px; }

    #tooltip {
      position:fixed; pointer-events:none; z-index:20;
      background:rgba(8,12,32,.92); border:1px solid rgba(255,255,255,.12);
      border-radius:12px; padding:12px 16px; backdrop-filter:blur(14px);
      max-width:190px; opacity:0; transition:opacity .3s; font-size:.88rem; line-height:1.5;
    }
    #tooltip.show { opacity:1; }
    #tooltip strong { font-family:'Playfair Display',serif; color:var(--rosa); display:block; margin-bottom:4px; }

    #cur { position:fixed; width:14px; height:14px; border-radius:50%;
      background:radial-gradient(circle,#fce8c9,#e88fa0);
      box-shadow:0 0 10px #e88fa0; transform:translate(-50%,-50%);
      pointer-events:none; z-index:9999; mix-blend-mode:screen; }

    .btn-volver {
      position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
      background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.15);
      color:rgba(255,255,255,.7); padding:10px 26px; border-radius:50px;
      font-family:'Cormorant Garamond',serif; font-style:italic;
      font-size:1rem; text-decoration:none; z-index:20; transition:all .3s;
    }
    .btn-volver:hover { background:rgba(255,255,255,.14); color:white; transform:translateX(-50%) translateY(-2px); }
  </style>
</head>
<body>
<div id="cur"></div>
<canvas id="c"></canvas>

<div id="hud">
  <div style="text-align:center">
    <div class="hud-titulo">Nuestro Universo</div>
    <div class="hud-sub">✦ Un sistema solar hecho de amor ✦</div>
  </div>
  <p class="hud-hint">Mueve el mouse · Haz clic en los planetas</p>
</div>

<div id="panelStats">
  <div class="chip"><span class="val" id="sDias">—</span><span class="lbl">días juntos</span></div>
  <div class="chip"><span class="val" id="sLatidos">—</span><span class="lbl">latidos de amor</span></div>
  <div class="chip"><span class="val" id="sOrbitas">—</span><span class="lbl">órbitas al sol</span></div>
</div>

<div id="tooltip"></div>
<a href="/" class="btn-volver">← Volver</a>

<script>
'use strict';
const cvs = document.getElementById('c');
const ctx = cvs.getContext('2d');
const tip = document.getElementById('tooltip');
const cur = document.getElementById('cur');

let W, H, mx = 200, my = 200, t = 0, camX = 0, camY = 0;

const resize = () => { W = cvs.width = innerWidth; H = cvs.height = innerHeight; };
resize();
addEventListener('resize', resize);

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cur.style.left = mx + 'px'; cur.style.top = my + 'px';
  camX += ((mx / W - .5) * 18 - camX) * .08;
  camY += ((my / H - .5) * 18 - camY) * .08;
});

// ── Estrellas ──────────────────────────────────────────────
const STARS = Array.from({length:320}, () => ({
  x: Math.random(), y: Math.random(),
  r: Math.random() * 1.3 + .2,
  a: Math.random(),
  da: (Math.random()*.005+.001)*(Math.random()<.5?1:-1),
  h: Math.random()*60+200,
}));

// ── Sistema solar ──────────────────────────────────────────
const SOL = { x:.38, y:.5, r:38, label:'Frank ☀️', desc:'El centro de tu universo.\nSiempre brillando para ti.' };

const PLANETAS = [
  { nom:'Luyuromo 🌙', desc:'Mi luna. Mi todo.\nLa que ilumina cada noche.',
    a:0, da:.0007, dist:.22, r:22, fase:0,
    col:['#f1f5f9','#94a3b8'], glow:'rgba(200,220,255,.5)', luna:true },
  { nom:'Amor 💕',  desc:'El planeta más cercano\nal corazón.',
    a:2.1, da:.0012, dist:.13, r:12,
    col:['#ff6b81','#ff4757'], glow:'rgba(255,107,129,.6)' },
  { nom:'Recuerdos ✨', desc:'Cada momento juntos\nforma este planeta.',
    a:1.3, da:.0006, dist:.30, r:16,
    col:['#f5c842','#ff9d00'], glow:'rgba(245,200,66,.5)' },
  { nom:'Sueños 🌟', desc:'Todo lo que queremos\nconstruir juntos.',
    a:4.2, da:.0004, dist:.40, r:14,
    col:['#0afab0','#059669'], glow:'rgba(10,250,176,.5)' },
  { nom:'Risas 🎉',  desc:'Las carcajadas que\nnos damos juntos.',
    a:3.5, da:.0009, dist:.17, r:10,
    col:['#c084fc','#9333ea'], glow:'rgba(192,132,252,.5)' },
];

const ASTER = Array.from({length:80}, (_,i) => ({
  a: (i/80)*Math.PI*2 + Math.random()*.2,
  dist: .47 + Math.random()*.07,
  r: .8 + Math.random()*1.5,
  da: .0001 + Math.random()*.0002,
}));

// ── Hit test ───────────────────────────────────────────────
let hovered = null;

function hitTest(sx, sy) {
  hovered = null;
  if (Math.hypot(mx - sx, my - sy) < SOL.r + 12) { hovered = SOL; return; }
  for (const p of PLANETAS) {
    if (Math.hypot(mx - p._px, my - p._py) < p.r + 14) { hovered = p; return; }
  }
}

function showTip(obj) {
  if (!obj) { tip.classList.remove('show'); return; }
  const px = obj._px ?? (W * SOL.x + camX);
  const py = obj._py ?? (H * SOL.y + camY);
  tip.style.left = Math.min(px + 20, W - 210) + 'px';
  tip.style.top  = Math.max(py - 60, 8) + 'px';
  tip.innerHTML  = `<strong>${obj.nom || obj.label}</strong>${(obj.desc||'').replace(/\n/g,'<br>')}`;
  tip.classList.add('show');
}

// ── Clic en planetas ───────────────────────────────────────
cvs.addEventListener('click', e => {
  if (!hovered) return;
  const el = document.createElement('div');
  el.style.cssText = `position:fixed;left:${e.clientX}px;top:${e.clientY}px;
    font-size:1.5rem;pointer-events:none;z-index:100;
    animation:prtcl .9s ease forwards;`;
  el.textContent = ['💕','✨','🌟','🤍'][Math.floor(Math.random()*4)];
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
});

// ── Render loop ─────────────────────────────────────────────
function frame() {
  ctx.clearRect(0, 0, W, H);
  t += .004;

  // nebulosa
  const nb = ctx.createRadialGradient(W*.4,H*.4,0,W*.4,H*.4,W*.7);
  nb.addColorStop(0,'rgba(80,0,100,.08)'); nb.addColorStop(1,'transparent');
  ctx.fillStyle = nb; ctx.fillRect(0,0,W,H);

  // estrellas
  STARS.forEach(s => {
    s.a = Math.max(.04, Math.min(.92, s.a+s.da));
    if (s.a>=.92||s.a<=.04) s.da *= -1;
    ctx.beginPath();
    ctx.arc(s.x*W + camX*.1, s.y*H + camY*.1, s.r, 0, Math.PI*2);
    ctx.fillStyle = `hsla(${s.h},70%,90%,${s.a*.65})`;
    ctx.fill();
  });

  const sx = W*SOL.x + camX, sy = H*SOL.y + camY;

  // órbitas
  ctx.save(); ctx.strokeStyle = 'rgba(255,255,255,.04)'; ctx.lineWidth = .8;
  PLANETAS.forEach(p => {
    ctx.beginPath(); ctx.ellipse(sx, sy, W*p.dist, H*p.dist*.55, 0, 0, Math.PI*2); ctx.stroke();
  });
  ctx.restore();

  // asteroides
  ASTER.forEach(a => {
    a.a += a.da;
    ctx.beginPath();
    ctx.arc(sx + Math.cos(a.a)*W*a.dist, sy + Math.sin(a.a)*H*a.dist*.55, a.r, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(180,180,200,.22)'; ctx.fill();
  });

  // planetas
  PLANETAS.forEach(p => {
    p.a += p.da;
    p._px = sx + Math.cos(p.a)*W*p.dist;
    p._py = sy + Math.sin(p.a)*H*p.dist*.55;

    // glow
    const gg = ctx.createRadialGradient(p._px,p._py,0,p._px,p._py,p.r*2.8);
    gg.addColorStop(0, p.glow||'rgba(200,200,255,.25)'); gg.addColorStop(1,'transparent');
    ctx.beginPath(); ctx.arc(p._px,p._py,p.r*2.8,0,Math.PI*2); ctx.fillStyle=gg; ctx.fill();

    // body
    const gr = ctx.createRadialGradient(p._px-p.r*.3, p._py-p.r*.3, 0, p._px, p._py, p.r);
    gr.addColorStop(0, p.col[0]); gr.addColorStop(1, p.col[1]);
    ctx.beginPath(); ctx.arc(p._px,p._py,p.r,0,Math.PI*2); ctx.fillStyle=gr; ctx.fill();

    // cráteres de la luna
    if (p.luna) {
      ctx.save(); ctx.globalAlpha=.22;
      [[-.3,-.25,.3],[.2,.15,.18],[-.15,.3,.22]].forEach(([dx,dy,cr])=>{
        ctx.beginPath(); ctx.arc(p._px+dx*p.r,p._py+dy*p.r,cr*p.r,0,Math.PI*2);
        ctx.fillStyle='#333'; ctx.fill();
      });
      ctx.restore();
    }

    if (hovered && hovered.nom === p.nom) {
      ctx.beginPath(); ctx.arc(p._px,p._py,p.r+6,0,Math.PI*2);
      ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.lineWidth=1.5; ctx.stroke();
    }
  });

  // sol
  SOL._px = sx; SOL._py = sy;
  const pulse = 1 + .08*Math.sin(t*3);
  for (let i=3;i>0;i--) {
    const sr = SOL.r*(1+i*.6)*pulse;
    const sg = ctx.createRadialGradient(sx,sy,0,sx,sy,sr);
    sg.addColorStop(0,`rgba(255,160,0,${.1/i})`); sg.addColorStop(1,'transparent');
    ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2); ctx.fillStyle=sg; ctx.fill();
  }
  const solG = ctx.createRadialGradient(sx-SOL.r*.3,sy-SOL.r*.35,0,sx,sy,SOL.r);
  solG.addColorStop(0,'#fff8e0'); solG.addColorStop(.5,'#ffc040'); solG.addColorStop(1,'#ff5e00');
  ctx.beginPath(); ctx.arc(sx,sy,SOL.r,0,Math.PI*2); ctx.fillStyle=solG; ctx.fill();

  hitTest(sx, sy);
  showTip(hovered);
  requestAnimationFrame(frame);
}
frame();

// CSS para partículas de clic
const s = document.createElement('style');
s.textContent = `@keyframes prtcl {
  0%{opacity:1;transform:translate(-50%,-50%) scale(1)}
  100%{opacity:0;transform:translate(-50%,-120px) scale(.5)}
}`;
document.head.appendChild(s);

// Cargar stats
fetch('/api/estadisticas_amor').then(r=>r.json()).then(d=>{
  const diasN = parseInt((d.dias_juntos||'0').replace(/,/g,''));
  const latN  = parseInt((d.latidos_estimados||'0').replace(/,/g,''));
  document.getElementById('sDias').textContent    = d.dias_juntos;
  document.getElementById('sLatidos').textContent = (latN/1e6).toFixed(1)+'M';
  document.getElementById('sOrbitas').textContent = d.orbitas_al_sol;
}).catch(()=>{
  document.getElementById('sDias').textContent = '∞';
});
</script>
</body>
</html>
