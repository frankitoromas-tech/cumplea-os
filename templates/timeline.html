<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📖 Nuestra Historia — Luyuromo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/immersive.css') }}">
  <style>
    :root {
      --fondo:#04071a; --rosa:#ff6b81; --dorado:#f5c842;
      --verde:#0afab0; --texto:#f0e8ff;
      --glass:rgba(255,255,255,.05); --borde:rgba(255,255,255,.1);
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html { scroll-behavior:smooth; }
    body {
      background:var(--fondo);
      background-image: radial-gradient(ellipse at 20% 30%, rgba(120,30,80,.12) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 70%, rgba(20,60,150,.1) 0%, transparent 50%);
      color:var(--texto); font-family:'Cormorant Garamond',serif;
      min-height:100vh; height:auto; overflow-y:auto; padding:60px 20px 100px;
      cursor:none;
    }

    #cursor { position:fixed; width:14px; height:14px; border-radius:50%;
      background:radial-gradient(circle,#fce8c9,#e88fa0);
      box-shadow:0 0 10px #e88fa0; transform:translate(-50%,-50%);
      pointer-events:none; z-index:9999; mix-blend-mode:screen; }

    /* ── Header ── */
    .tl-header { text-align:center; margin-bottom:70px; animation: fadeDown 1s ease both; }
    .tl-eyebrow { font-style:italic; color:var(--rosa); font-size:.95rem; letter-spacing:3px; margin-bottom:10px; }
    .tl-titulo  { font-family:'Playfair Display',serif; font-size:clamp(2rem,5vw,3.8rem);
                  color:var(--texto); line-height:1.2; }
    .tl-subtitulo { font-style:italic; color:rgba(255,255,255,.5); font-size:1.1rem; margin-top:10px; }

    /* ── Línea central ── */
    .tl-wrapper { position:relative; max-width:800px; margin:0 auto; }

    .tl-linea-central {
      position:absolute; left:50%; top:0; bottom:0; width:2px;
      background:linear-gradient(to bottom, transparent, var(--rosa) 10%, var(--rosa) 90%, transparent);
      transform:translateX(-50%);
      box-shadow:0 0 12px rgba(255,107,129,.4);
    }

    /* ── Tarjetas ── */
    .tl-item {
      display:flex; align-items:flex-start; gap:30px; margin-bottom:60px;
      opacity:0; transform:translateY(30px);
      transition:opacity .7s ease, transform .7s ease;
      position:relative;
    }
    .tl-item.visible { opacity:1; transform:translateY(0); }
    .tl-item:nth-child(even) { flex-direction:row-reverse; }

    .tl-card {
      flex:1; background:var(--glass); border:1px solid var(--borde);
      border-radius:18px; padding:28px 30px;
      backdrop-filter:blur(12px);
      box-shadow:0 4px 30px rgba(0,0,0,.2);
      transition:transform .3s ease, box-shadow .3s ease;
      cursor:default; position:relative;
    }
    .tl-card:hover {
      transform:translateY(-5px);
      box-shadow:0 12px 40px rgba(255,107,129,.15);
      border-color:rgba(255,107,129,.25);
    }

    /* Flecha de la tarjeta hacia el centro */
    .tl-item:nth-child(odd) .tl-card::after {
      content:''; position:absolute; right:-10px; top:28px;
      border:6px solid transparent; border-left-color:var(--borde);
    }
    .tl-item:nth-child(even) .tl-card::after {
      content:''; position:absolute; left:-10px; top:28px;
      border:6px solid transparent; border-right-color:var(--borde);
    }

    .tl-icono-wrap {
      flex-shrink:0; width:56px; height:56px; border-radius:50%;
      background:rgba(255,107,129,.12); border:2px solid rgba(255,107,129,.3);
      display:flex; align-items:center; justify-content:center;
      font-size:1.8rem; position:relative; z-index:1;
      box-shadow:0 0 20px rgba(255,107,129,.2);
      flex-shrink:0; align-self:center;
    }

    .tl-fecha { font-style:italic; color:var(--dorado); font-size:.85rem;
                letter-spacing:2px; margin-bottom:8px; }
    .tl-card-titulo { font-family:'Playfair Display',serif; font-size:1.4rem;
                       color:var(--rosa); margin-bottom:10px; line-height:1.2; }
    .tl-card-desc { font-size:1.05rem; line-height:1.8; color:rgba(255,255,255,.8); }

    /* ── Punto final ── */
    .tl-fin {
      text-align:center; margin-top:20px; padding:40px 20px;
      opacity:0; transform:translateY(30px);
      transition:opacity .7s ease, transform .7s ease;
    }
    .tl-fin.visible { opacity:1; transform:translateY(0); }
    .tl-fin-icono { font-size:3rem; display:block; margin-bottom:16px;
                    animation:latir 1.5s ease-in-out infinite; }
    .tl-fin-texto { font-family:'Playfair Display',serif; font-style:italic;
                    font-size:clamp(1.2rem,3vw,2rem); color:var(--texto); }
    .tl-fin-sub { font-style:italic; color:rgba(255,255,255,.5); margin-top:10px; font-size:1rem; }
    @keyframes latir { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }

    /* ── Frase del día ── */
    .tl-frase {
      text-align:center; max-width:560px; margin:0 auto 60px;
      background:var(--glass); border:1px solid var(--borde);
      border-radius:14px; padding:20px 26px;
      font-style:italic; font-size:1.1rem; color:rgba(255,255,255,.75);
      backdrop-filter:blur(8px);
      animation:fadeDown .8s .5s ease both; opacity:0;
    }

    /* Botón volver */
    .btn-volver {
      display:block; width:fit-content; margin:30px auto 0;
      background:var(--glass); border:1px solid var(--borde);
      color:rgba(255,255,255,.7); padding:10px 26px; border-radius:50px;
      font-family:'Cormorant Garamond',serif; font-style:italic;
      font-size:1rem; text-decoration:none; transition:all .3s;
    }
    .btn-volver:hover { background:rgba(255,107,129,.12); color:white; transform:translateY(-2px); }

    @keyframes fadeDown {
      from { opacity:0; transform:translateY(-15px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* Responsive */
    @media (max-width:640px) {
      .tl-linea-central { display:none; }
      .tl-item, .tl-item:nth-child(even) { flex-direction:column; }
      .tl-item:nth-child(odd)  .tl-card::after,
      .tl-item:nth-child(even) .tl-card::after { display:none; }
      .tl-icono-wrap { align-self:flex-start; }
    }
  </style>
</head>
<body data-music="timeline">
<div id="cursor"></div>

<div class="tl-header" data-reveal="up">
  <p class="tl-eyebrow">✦ Capítulo por capítulo ✦</p>
  <h1 class="tl-titulo">Nuestra Historia</h1>
  <p class="tl-subtitulo">Cada momento contigo merece ser recordado</p>
</div>

<p class="tl-frase" id="fraseDia">Cargando frase del día...</p>

<div class="tl-wrapper">
  <div class="tl-linea-central"></div>
  <div id="timelineContenedor"></div>

  <div class="tl-fin" id="tlFin">
    <span class="tl-fin-icono">💕</span>
    <p class="tl-fin-texto">Y la historia continúa...</p>
    <p class="tl-fin-sub">Cada día nuevo es una página más de algo muy especial</p>
  </div>
</div>

<a href="/" class="btn-volver">← Volver a la sorpresa</a>

<script>
'use strict';

// Cursor
const cur = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cur.style.left = e.clientX + 'px';
  cur.style.top  = e.clientY + 'px';
});

// Animación de aparición con IntersectionObserver
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.15 });

// Cargar timeline desde la API
fetch('/api/timeline')
  .then(r => r.json())
  .then(data => {
    const cont = document.getElementById('timelineContenedor');
    data.momentos.forEach((m, i) => {
      const item = document.createElement('div');
      item.className = 'tl-item';
      item.innerHTML = `
        <div class="tl-icono-wrap">${m.icono}</div>
        <div class="tl-card">
          <p class="tl-fecha">${m.fecha}</p>
          <h3 class="tl-card-titulo">${m.titulo}</h3>
          <p class="tl-card-desc">${m.descripcion}</p>
        </div>`;
      cont.appendChild(item);
      observer.observe(item);
    });
    observer.observe(document.getElementById('tlFin'));
  })
  .catch(() => {
    document.getElementById('timelineContenedor').innerHTML =
      '<p style="text-align:center;opacity:.5;font-style:italic;">No se pudo cargar la historia...</p>';
  });

// Frase del día
fetch('/api/frase_del_dia')
  .then(r => r.json())
  .then(d => {
    document.getElementById('fraseDia').textContent = `✨ "${d.frase}"`;
  }).catch(() => {});

// Notificar
fetch('/api/notificar', {
  method:'POST', headers:{'Content-Type':'application/json'},
  body: JSON.stringify({evento:'timeline'})
}).catch(() => {});
</script>

<!-- ── Capa inmersiva (audio + tilt). El timeline ya tiene su propio
     IntersectionObserver para .tl-item.visible, no lo pisamos. ── -->
<script src="{{ url_for('static', filename='js/immersive/boot-lite.js') }}" defer></script>
</body>
</html>
