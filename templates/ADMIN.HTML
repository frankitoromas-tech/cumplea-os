<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔧 Panel Admin — Frank</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Cormorant+Garamond&display=swap" rel="stylesheet">
  <style>
    :root { --rosa:#ff6b81; --verde:#0afab0; --dorado:#f5c842; --fondo:#080c1e; --glass:rgba(255,255,255,.05); }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--fondo); color:#f0e8ff; font-family:'Cormorant Garamond',serif;
           padding:30px 20px; min-height:100vh; height:auto; overflow-y:auto; }
    h1 { font-family:'Playfair Display',serif; color:var(--rosa); font-size:2rem; margin-bottom:4px; }
    .sub { color:#94a3b8; font-style:italic; margin-bottom:30px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:20px; }
    .card { background:var(--glass); border:1px solid rgba(255,255,255,.1); border-radius:14px; padding:22px; }
    .card h3 { font-family:'Playfair Display',serif; font-size:1.1rem; color:var(--rosa); margin-bottom:14px; }
    .stat { display:flex; justify-content:space-between; align-items:center;
            padding:8px 0; border-bottom:1px solid rgba(255,255,255,.06); font-size:1rem; }
    .stat:last-child { border-bottom:none; }
    .valor { color:var(--dorado); font-weight:bold; }
    .badge { display:inline-block; padding:3px 10px; border-radius:50px; font-size:.85rem; }
    .ok  { background:rgba(10,250,176,.15); color:var(--verde); }
    .err { background:rgba(255,71,87,.15);  color:var(--rosa); }
    button { background:linear-gradient(135deg,#ff4757,var(--rosa)); color:white; border:none;
             padding:12px 24px; border-radius:50px; cursor:pointer;
             font-family:'Playfair Display',serif; font-size:1rem;
             transition:all .3s; width:100%; margin-top:12px; }
    button:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(255,71,87,.3); }
    button:disabled { opacity:.5; cursor:not-allowed; transform:none; }
    #log { background:rgba(0,0,0,.5); border-radius:8px; padding:14px; font-size:.85rem;
           color:var(--verde); font-family:monospace; max-height:200px; overflow-y:auto;
           white-space:pre-wrap; margin-top:12px; }
  </style>
</head>
<body>
<h1>🔧 Panel de Control</h1>
<p class="sub">Solo tú puedes ver esto, Frank 🌙</p>

<div class="grid">

  <div class="card">
    <h3>🛰️ Estado del Servidor</h3>
    <div id="estadoServidor"><div class="stat"><span>Cargando...</span></div></div>
    <button onclick="cargarSalud()">🔄 Actualizar</button>
  </div>

  <div class="card">
    <h3>📡 Telegram</h3>
    <p style="font-size:.9rem;color:#94a3b8;margin-bottom:10px;">
      Envía un mensaje de prueba para verificar la conexión con tu bot.
    </p>
    <div id="tgStatus"></div>
    <button onclick="testTelegram()" id="btnTg">📤 Enviar mensaje de prueba</button>
  </div>

  <div class="card">
    <h3>📊 Visitas</h3>
    <div id="statsVisitas"><div class="stat"><span>Cargando...</span></div></div>
    <button onclick="cargarVisitas()">🔄 Actualizar</button>
  </div>

  <div class="card">
    <h3>💞 Estadísticas de Amor</h3>
    <div id="statsAmor"><div class="stat"><span>Cargando...</span></div></div>
    <button onclick="cargarAmor()">🔄 Actualizar</button>
  </div>

  <div class="card">
    <h3>✨ Frase del Día</h3>
    <div id="fraseDia" style="font-style:italic;color:var(--dorado);margin-bottom:10px;min-height:2em;"></div>
    <button onclick="cargarFrase()">🔄 Cargar frase</button>
  </div>

  <div class="card">
    <h3>📦 Cápsula del Tiempo</h3>
    <div id="estadoCapsula"><div class="stat"><span>Cargando...</span></div></div>
    <button onclick="cargarCapsula()">🔄 Consultar cápsula</button>
  </div>

</div>

<script>
async function cargarSalud() {
  const d = await (await fetch('/api/salud')).json();
  document.getElementById('estadoServidor').innerHTML = `
    <div class="stat"><span>Servidor</span><span class="badge ok">${d.servidor}</span></div>
    <div class="stat"><span>Telegram</span><span class="valor" style="font-size:.85rem">${d.telegram}</span></div>
    <div class="stat"><span>Timestamp</span><span style="font-size:.8rem;color:#94a3b8">${new Date(d.timestamp).toLocaleString('es')}</span></div>`;
}

async function testTelegram() {
  const btn = document.getElementById('btnTg');
  btn.disabled = true; btn.innerText = 'Enviando...';
  try {
    const r = await fetch('/api/test_telegram', {method:'POST'});
    const d = await r.json();
    document.getElementById('tgStatus').innerHTML =
      `<div class="badge ${r.ok?'ok':'err'}" style="display:block;margin-bottom:8px;">${d.mensaje}</div>`;
  } catch(e) {
    document.getElementById('tgStatus').innerHTML = `<div class="badge err">Error de red</div>`;
  }
  btn.disabled = false; btn.innerText = '📤 Enviar mensaje de prueba';
}

async function cargarVisitas() {
  const d = await (await fetch('/api/visitas')).json();
  const porDia = Object.entries(d.por_dia||{}).slice(-5).reverse();
  let html = `<div class="stat"><span>Total</span><span class="valor">${d.total}</span></div>
              <div class="stat"><span>Hoy</span><span class="valor">${d.hoy}</span></div>`;
  porDia.forEach(([fecha,n]) => {
    html += `<div class="stat"><span>${fecha}</span><span class="valor">${n}</span></div>`;
  });
  document.getElementById('statsVisitas').innerHTML = html;
}

async function cargarAmor() {
  const d = await (await fetch('/api/estadisticas_amor')).json();
  document.getElementById('statsAmor').innerHTML = `
    <div class="stat"><span>Días vividos</span><span class="valor">${d.dias_vividos}</span></div>
    <div class="stat"><span>Semanas de vida</span><span class="valor">${d.semanas_vividas}</span></div>
    <div class="stat"><span>Días juntos</span><span class="valor">${d.dias_juntos}</span></div>
    <div class="stat"><span>Órbitas al sol</span><span class="valor">${d.orbitas_al_sol}</span></div>
    <div class="stat"><span>Próximo cumpleaños</span><span class="valor">${d.dias_para_cumple} días</span></div>`;
}

async function cargarFrase() {
  const d = await (await fetch('/api/frase_del_dia')).json();
  document.getElementById('fraseDia').textContent = `"${d.frase}"`;
}

async function cargarCapsula() {
  const d = await (await fetch('/api/capsula')).json();
  const estado = d.estado === 'abierta'
    ? `<div class="badge ok">✅ Abierta</div>`
    : `<div class="badge err">🔒 Cerrada — ${d.dias_restantes ?? '?'} días</div>`;
  document.getElementById('estadoCapsula').innerHTML = `
    <div class="stat"><span>Estado</span>${estado}</div>
    <div class="stat" style="flex-direction:column;align-items:flex-start;gap:4px;">
      <span style="font-size:.85rem;color:#94a3b8;">${d.mensaje}</span>
    </div>`;
}

// Auto-cargar
cargarSalud(); cargarVisitas(); cargarAmor(); cargarFrase(); cargarCapsula();
</script>
</body>
</html>
