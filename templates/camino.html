<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Nuestro Camino — Lima → Medellín</title>
  <meta name="theme-color" content="#02040e">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,300;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --rosa: #ff6b81;
      --dorado: #f5c842;
      --texto: #e8eaff;
      --panel-bg: rgba(8, 12, 30, 0.72);
      --panel-border: rgba(255, 255, 255, 0.15);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      overflow: hidden;
      background: #02040e;
      color: var(--texto);
      font-family: 'Cormorant Garamond', serif;
    }

    /* Cielo estrellado de fondo (3 capas radiales sutiles) */
    body::before {
      content: "";
      position: fixed; inset: 0;
      background:
        radial-gradient(2px 2px at 20% 30%,  rgba(255,255,255,0.6) 50%, transparent 51%),
        radial-gradient(1px 1px at 70% 40%,  rgba(255,255,255,0.5) 50%, transparent 51%),
        radial-gradient(1px 1px at 35% 75%,  rgba(255,255,255,0.4) 50%, transparent 51%),
        radial-gradient(1px 1px at 85% 80%,  rgba(255,255,255,0.5) 50%, transparent 51%),
        radial-gradient(1px 1px at 50% 15%,  rgba(255,255,255,0.3) 50%, transparent 51%),
        radial-gradient(ellipse at 50% 50%, rgba(40, 25, 80, 0.35) 0%, transparent 65%);
      background-size: 240px 240px, 320px 320px, 180px 180px, 280px 280px, 200px 200px, 100% 100%;
      pointer-events: none;
      z-index: 0;
    }

    #globo { position: fixed; inset: 0; z-index: 1; }

    /* ── Título superior: píldora con blur para destacar sobre el globo ── */
    .titulo {
      position: fixed;
      top: calc(20px + env(safe-area-inset-top, 0px));
      left: 50%;
      transform: translateX(-50%);
      text-align: center; pointer-events: none; z-index: 12;
      background: rgba(8, 12, 30, 0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 22px;
      padding: 12px 28px;
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.45);
      max-width: min(92vw, 540px);
      animation: fade-in 1.6s ease both;
    }
    .titulo h1 {
      font-family: 'Playfair Display', serif; font-style: italic;
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      letter-spacing: 3px;
      color: #fff;
      text-shadow:
        0 0 24px rgba(255, 107, 129, 0.5),
        0 0 48px rgba(255, 255, 255, 0.18);
      line-height: 1.1;
    }
    .titulo p {
      font-style: italic; font-size: 0.92rem; color: rgba(255, 220, 230, 0.85);
      margin-top: 4px; letter-spacing: 1px;
    }

    /* ── Panel lateral derecho con datos ────────────────────── */
    /* En desktop vive a la derecha, centrado verticalmente, para no
       tapar el globo (que es el protagonista). En móvil baja al pie. */
    .panel-camino {
      position: fixed;
      top: 50%;
      right: calc(20px + env(safe-area-inset-right, 0px));
      left: auto;
      bottom: auto;
      transform: translateY(-50%);
      width: clamp(280px, 26vw, 340px);
      background: var(--panel-bg);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      padding: 18px 22px;
      z-index: 10;
      animation: fade-in-right 1.8s 0.6s ease both; opacity: 0;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      text-align: center;
    }
    .panel-titulo {
      font-family: 'Playfair Display', serif; font-style: italic;
      color: var(--rosa); font-size: 1.05rem; letter-spacing: 1px;
    }
    .panel-distancia {
      font-family: 'Playfair Display', serif;
    }
    .panel-distancia .km { color: var(--dorado); font-size: 1.6rem; }
    .panel-distancia .lbl {
      font-size: 0.65rem; color: rgba(255, 255, 255, 0.55);
      letter-spacing: 2px; text-transform: uppercase; display: block; margin-top: 2px;
    }
    .panel-mensaje {
      font-style: italic; font-size: 0.9rem; color: rgba(255, 255, 255, 0.78);
      line-height: 1.5; max-width: 360px;
    }
    .fotos-strip {
      display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
    }
    .fotos-strip img {
      width: 42px; height: 42px; border-radius: 50%; object-fit: cover;
      border: 2px solid rgba(255, 107, 129, 0.55); cursor: pointer;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      background: #1a1530;
    }
    .fotos-strip img:hover {
      transform: scale(1.18);
      border-color: var(--rosa);
      box-shadow: 0 0 18px rgba(255, 107, 129, 0.5);
    }

    /* ── Pin sobre el globo (HTML element) ──────────────────── */
    .pin-ciudad {
      position: relative; pointer-events: none;
      text-align: center;
      transform: translate(-50%, -100%);
    }
    .pin-ciudad .nombre {
      background: rgba(8, 12, 30, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: white; font-size: 0.78rem;
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      padding: 3px 9px; border-radius: 8px; margin-bottom: 6px;
      white-space: nowrap; letter-spacing: 0.5px;
      backdrop-filter: blur(6px);
    }
    .pin-ciudad .punto {
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--rosa); border: 2.5px solid white;
      box-shadow: 0 0 14px var(--rosa), 0 0 36px rgba(255, 107, 129, 0.45);
      margin: 0 auto;
      animation: pin-pulse 2s ease-in-out infinite;
    }
    @keyframes pin-pulse {
      0%, 100% { box-shadow: 0 0 14px var(--rosa), 0 0 36px rgba(255, 107, 129, 0.45); }
      50%      { box-shadow: 0 0 22px var(--rosa), 0 0 60px rgba(255, 107, 129, 0.7); }
    }

    /* ── Corazones que forman la línea Lima → Medellín ───────── */
    /* Por defecto invisibles: aparecen sólo cuando se hace clic al
       botón "Trazar nuestro camino". Cada corazón recibe su delay
       individual desde JS para que el trazado fluya de Lima a Medellín. */
    .corazon-camino {
      position: relative;
      transform: translate(-50%, -50%) scale(0.2);
      opacity: 0;
      pointer-events: none;
      font-size: 1.4rem;
      line-height: 1;
      filter: drop-shadow(0 0 8px rgba(255, 107, 129, 0.85))
              drop-shadow(0 0 16px rgba(255, 107, 129, 0.35));
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
                  opacity 0.45s ease;
      will-change: transform, opacity;
    }
    .corazon-camino.aparece {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
      animation: latido-camino 1.6s ease-in-out infinite;
      animation-delay: 0.5s; /* arranca el latido tras el bounce */
    }
    @keyframes latido-camino {
      0%, 100% { transform: translate(-50%, -50%) scale(0.85); opacity: 0.78; }
      50%      { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
    }

    /* ── Botón "Trazar nuestro camino" ─────────────────────── */
    .btn-trazar {
      position: relative;
      width: 100%;
      padding: 12px 18px;
      margin-top: 4px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 600;
      font-size: 0.98rem;
      color: #0a0512;
      background: linear-gradient(135deg, #ff6b81 0%, #ff97a8 50%, #f5c842 100%);
      background-size: 200% 100%;
      background-position: 0% 0%;
      box-shadow:
        0 8px 22px rgba(255, 107, 129, 0.45),
        inset 0 1px 0 rgba(255, 255, 255, 0.35);
      transition: transform 0.25s ease,
                  box-shadow 0.25s ease,
                  background-position 0.4s ease,
                  opacity 0.4s ease;
      overflow: hidden;
      letter-spacing: 0.3px;
    }
    .btn-trazar::before {
      content: "";
      position: absolute; inset: 0;
      background: radial-gradient(circle at var(--mx, 50%) 50%,
        rgba(255, 255, 255, 0.35) 0%, transparent 60%);
      opacity: 0; transition: opacity 0.3s;
      pointer-events: none;
    }
    .btn-trazar:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(255, 107, 129, 0.6),
                  inset 0 1px 0 rgba(255, 255, 255, 0.45);
      background-position: 100% 0%;
    }
    .btn-trazar:hover::before { opacity: 1; }
    .btn-trazar:active { transform: translateY(0); }
    .btn-trazar.trazando {
      pointer-events: none;
      background: linear-gradient(135deg, #ff6b81, #ff97a8);
      animation: trazar-pulse 1.4s ease-in-out infinite;
    }
    .btn-trazar.trazado {
      pointer-events: none;
      background: linear-gradient(135deg, rgba(255, 107, 129, 0.4), rgba(245, 200, 66, 0.35));
      color: rgba(255, 255, 255, 0.85);
      box-shadow: none;
      cursor: default;
    }
    @keyframes trazar-pulse {
      0%, 100% { box-shadow: 0 8px 22px rgba(255, 107, 129, 0.45); }
      50%      { box-shadow: 0 8px 32px rgba(255, 107, 129, 0.85); }
    }

    /* Toast romántico al terminar el trazado */
    .toast-camino {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.7);
      background: linear-gradient(135deg, rgba(255, 107, 129, 0.95), rgba(245, 200, 66, 0.85));
      color: #1a0512;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.4rem;
      padding: 18px 32px;
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(255, 107, 129, 0.5);
      pointer-events: none;
      opacity: 0;
      z-index: 50;
      letter-spacing: 1px;
      text-align: center;
      max-width: 92vw;
    }
    .toast-camino.visible {
      animation: toast-aparece 3.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes toast-aparece {
      0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.7); }
      18%  { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
      28%  { transform: translate(-50%, -50%) scale(1); }
      82%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0.95); }
    }

    /* ── Botón volver: top-left, lejos del reproductor de música ───
       Antes lo tenía bottom-left pero ahí choca con control-musica.js
       (que también vive bottom-left con su propia píldora circular).
       Arriba-izquierda queda libre porque el título es centrado. */
    .btn-volver {
      position: fixed;
      top:  calc(22px + env(safe-area-inset-top, 0px));
      left: calc(22px + env(safe-area-inset-left, 0px));
      z-index: 30;
      background: rgba(8, 12, 30, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.22);
      color: #fff;
      padding: 10px 20px; border-radius: 50px;
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: 0.95rem; text-decoration: none;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: all 0.3s;
      animation: fade-in-static 1.4s ease both;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.45);
      white-space: nowrap;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-volver:hover {
      background: rgba(255, 107, 129, 0.32);
      border-color: rgba(255, 107, 129, 0.55);
      transform: translateY(-2px);
    }
    .btn-volver:active { transform: translateY(0); }

    /* ── Lightbox para fotos ───────────────────────────────── */
    .lightbox {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(2, 4, 14, 0.92); backdrop-filter: blur(12px);
      display: none; align-items: center; justify-content: center;
      cursor: zoom-out; opacity: 0; transition: opacity 0.3s;
    }
    .lightbox.abierto { display: flex; opacity: 1; }
    .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 14px; box-shadow: 0 18px 60px rgba(0, 0, 0, 0.6); }

    @keyframes fade-in {
      from { opacity: 0; transform: translateX(-50%) translateY(-12px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    @keyframes fade-in-right {
      from { opacity: 0; transform: translate(20px, -50%); }
      to   { opacity: 1; transform: translate(0, -50%); }
    }
    @keyframes fade-in-static {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive: en pantallas estrechas el panel vuelve abajo ── */
    @media (max-width: 860px) {
      .panel-camino {
        top: auto;
        right: auto;
        left: 50%;
        bottom: calc(20px + env(safe-area-inset-bottom, 0px));
        transform: translateX(-50%);
        width: calc(100% - 28px);
        max-width: 520px;
        animation: fade-in 1.8s 0.6s ease both;
      }
    }

    @media (max-width: 560px) {
      .titulo {
        top: calc(12px + env(safe-area-inset-top, 0px));
        padding: 9px 18px;
      }
      .titulo h1 { letter-spacing: 2px; }
      .titulo p { font-size: 0.82rem; }
      .btn-volver {
        top: calc(12px + env(safe-area-inset-top, 0px));
        left: 14px; padding: 8px 14px; font-size: 0.85rem;
      }
      .fotos-strip img { width: 38px; height: 38px; }
    }

    /* En móvil pequeño donde el título ocupa todo el ancho, mover
       el botón debajo del título para que no se solape. */
    @media (max-width: 480px) {
      .titulo { left: 50%; right: auto; max-width: calc(100vw - 28px); }
      .btn-volver {
        top: calc(78px + env(safe-area-inset-top, 0px));
        left: 14px;
        font-size: 0.8rem; padding: 6px 12px;
      }
    }
  </style>
</head>
<body data-music="luna" data-music-src="{{ url_for('static', filename='audio/universo.mp3') }}">

<a href="/universo" class="btn-volver" aria-label="Volver al universo">
  <span aria-hidden="true">←</span> Volver al universo
</a>

<div id="globo"></div>

<div class="titulo">
  <h1>Nuestro Camino</h1>
  <p>Cuéntame qué venció la distancia ✦</p>
</div>

<div class="panel-camino">
  <div class="panel-titulo">Lima, Perú → Medellín, Colombia</div>
  <div class="panel-distancia">
    <span class="km">2,040 km</span>
    <span class="lbl">en línea recta</span>
  </div>
  <p class="panel-mensaje">
    Una distancia que no fue distancia — porque tú ya la habías cruzado
    primero en mi corazón.
  </p>

  <button type="button" class="btn-trazar" id="btnTrazar"
          aria-label="Dibujar la línea de corazones entre Lima y Medellín">
    ✨ Trazar nuestro camino
  </button>

  <div class="fotos-strip" id="fotosStrip"></div>
</div>

<div class="toast-camino" id="toastCamino" role="status" aria-live="polite">
  💗 Te encontré, aunque el mapa nos dibujara lejos 💗
</div>

<div class="lightbox" id="lightbox" role="dialog" aria-label="Foto ampliada">
  <img id="lightboxImg" src="" alt="">
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.149/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/globe.gl@2.41.0/dist/globe.gl.min.js"></script>
<script>
'use strict';

const LIMA     = { lat: -12.0464, lng: -77.0428, ciudad: 'Lima, Perú' };
const MEDELLIN = { lat:   6.2476, lng: -75.5658, ciudad: 'Medellín, Colombia' };

/* ── Interpolación esférica (slerp) entre dos coordenadas geo ──
   Distribuye n-1 puntos sobre el gran círculo que las une, así
   los corazones se posan sobre la superficie siguiendo la curvatura
   real del planeta (no una línea recta proyectada). */
function slerpGeo(p1, p2, t) {
  const toRad = (d) => d * Math.PI / 180;
  const toDeg = (r) => r * 180 / Math.PI;
  const lat1 = toRad(p1.lat), lng1 = toRad(p1.lng);
  const lat2 = toRad(p2.lat), lng2 = toRad(p2.lng);

  const cx1 = Math.cos(lat1) * Math.cos(lng1);
  const cy1 = Math.cos(lat1) * Math.sin(lng1);
  const cz1 = Math.sin(lat1);
  const cx2 = Math.cos(lat2) * Math.cos(lng2);
  const cy2 = Math.cos(lat2) * Math.sin(lng2);
  const cz2 = Math.sin(lat2);

  const dot = Math.max(-1, Math.min(1, cx1*cx2 + cy1*cy2 + cz1*cz2));
  const omega = Math.acos(dot);
  if (omega < 1e-6) return { lat: p1.lat, lng: p1.lng };
  const s = Math.sin(omega);
  const a = Math.sin((1 - t) * omega) / s;
  const b = Math.sin(t * omega) / s;

  const x = a*cx1 + b*cx2;
  const y = a*cy1 + b*cy2;
  const z = a*cz1 + b*cz2;
  return {
    lat: toDeg(Math.asin(z / Math.sqrt(x*x + y*y + z*z))),
    lng: toDeg(Math.atan2(y, x)),
  };
}

/* 16 corazones entre Lima y Medellín (excluye los extremos
   porque allí ya viven los pins de las ciudades). El `orden` se usa
   para escalonar la aparición de Lima→Medellín cuando se hace clic. */
const N_CORAZONES = 16;
const CORAZONES = [];
const EMOJIS_CORAZON = ['💗', '💖', '💕', '🤍'];
for (let i = 1; i < N_CORAZONES; i++) {
  const t = i / N_CORAZONES;
  const punto = slerpGeo(LIMA, MEDELLIN, t);
  CORAZONES.push({
    lat: punto.lat,
    lng: punto.lng,
    tipo: 'corazon',
    orden: i,
    emoji: EMOJIS_CORAZON[i % EMOJIS_CORAZON.length],
  });
}

/* ── Fotos del usuario en el strip + lightbox ──────────────── */
const FOTOS = [
  '/static/DEFAULT_RECUERDOS/foto1.png',
  '/static/DEFAULT_RECUERDOS/foto2.png',
  '/static/DEFAULT_RECUERDOS/foto3.png',
  '/static/DEFAULT_RECUERDOS/foto4.png',
  '/static/DEFAULT_RECUERDOS/foto5.png',
];

const strip   = document.getElementById('fotosStrip');
const lb      = document.getElementById('lightbox');
const lbImg   = document.getElementById('lightboxImg');

FOTOS.forEach((src, i) => {
  const img = document.createElement('img');
  img.src = src; img.alt = 'Recuerdo ' + (i + 1);
  img.addEventListener('click', () => {
    lbImg.src = src;
    lb.classList.add('abierto');
  });
  strip.appendChild(img);
});

lb.addEventListener('click', () => {
  lb.classList.remove('abierto');
  setTimeout(() => { lbImg.src = ''; }, 320);
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && lb.classList.contains('abierto')) {
    lb.classList.remove('abierto');
  }
});

/* ── Globo realista con arco animado ───────────────────────── */
const globoEl = document.getElementById('globo');
const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

/* CDN base para las texturas; jsdelivr está permitido por la CSP. */
const TEX = 'https://cdn.jsdelivr.net/npm/three-globe@2.31.0/example/img/';

const globe = Globe()
  (globoEl)
  .globeImageUrl(TEX + 'earth-blue-marble.jpg')
  .bumpImageUrl(TEX + 'earth-topology.png')
  .backgroundColor('rgba(0,0,0,0)')                      // dejamos ver el cielo CSS
  .showAtmosphere(true)
  .atmosphereColor('#7ba8ff')
  .atmosphereAltitude(0.18)
  /* La línea Lima → Medellín es una constelación de corazones que pulsan,
     no un arco normal. Cada elemento HTML se posa sobre el gran círculo
     interpolado con slerp. */
  .htmlElementsData([
    ...CORAZONES,
    { lat: LIMA.lat,     lng: LIMA.lng,     label: LIMA.ciudad,     tipo: 'pin' },
    { lat: MEDELLIN.lat, lng: MEDELLIN.lng, label: MEDELLIN.ciudad, tipo: 'pin' },
  ])
  .htmlElement((d) => {
    if (d.tipo === 'corazon') {
      const el = document.createElement('div');
      el.className = 'corazon-camino';
      el.dataset.orden = String(d.orden);
      el.textContent = d.emoji;
      return el;
    }
    const el = document.createElement('div');
    el.className = 'pin-ciudad';
    el.innerHTML = `<div class="nombre">${d.label}</div><div class="punto"></div>`;
    return el;
  });

/* ── Trazado del camino: se dispara con el botón ───────────── */
const btnTrazar = document.getElementById('btnTrazar');
const toastEl   = document.getElementById('toastCamino');
const STEP_MS   = 130;   // delay entre cada corazón
const BOUNCE_MS = 520;   // duración del bounce de aparición
let trazadoIniciado = false;

function trazarCamino() {
  if (trazadoIniciado) return;
  trazadoIniciado = true;

  btnTrazar.classList.add('trazando');
  btnTrazar.textContent = '✦ Trazando…';

  // Cogemos los corazones del DOM (los crea globe.gl), los ordenamos
  // por data-orden y les agregamos .aparece en cascada.
  const corazonesDom = Array.from(document.querySelectorAll('.corazon-camino'))
    .sort((a, b) => Number(a.dataset.orden) - Number(b.dataset.orden));

  corazonesDom.forEach((el, idx) => {
    setTimeout(() => el.classList.add('aparece'), idx * STEP_MS);
  });

  const totalMs = corazonesDom.length * STEP_MS + BOUNCE_MS;
  setTimeout(() => {
    btnTrazar.classList.remove('trazando');
    btnTrazar.classList.add('trazado');
    btnTrazar.textContent = '✦ Camino trazado ✦';
    if (toastEl) {
      toastEl.classList.add('visible');
      setTimeout(() => toastEl.classList.remove('visible'), 3600);
    }
  }, totalMs);
}

if (btnTrazar) {
  /* Pequeño hover-tracking para el glow radial del botón */
  btnTrazar.addEventListener('mousemove', (e) => {
    const rect = btnTrazar.getBoundingClientRect();
    btnTrazar.style.setProperty('--mx', `${e.clientX - rect.left}px`);
  });
  btnTrazar.addEventListener('click', trazarCamino);
}

/* Si el usuario prefiere reduced motion, mostramos el trazado completo
   al toque sin escalonado largo. Y si no toca el botón, no aparece. */
if (reducedMotion) {
  // No autoplay: respetamos el patrón del botón también en RM.
  // Sólo cambiamos los timings.
}

/* Cámara: punto medio (~ entre Lima y Medellín) */
globe.pointOfView({ lat: -3, lng: -76, altitude: 2.2 }, 0);

/* Rotación lenta + zoom suave de arranque */
const ctrl = globe.controls();
ctrl.autoRotate = !reducedMotion;
ctrl.autoRotateSpeed = 0.35;
ctrl.enableDamping = true;
ctrl.dampingFactor = 0.08;
ctrl.minDistance = 200;
ctrl.maxDistance = 600;

/* Responsive: ajustamos width/height al viewport */
function fit() {
  globe.width(window.innerWidth).height(window.innerHeight);
}
window.addEventListener('resize', fit);
fit();

/* Pequeña animación de "vuelo de bienvenida" */
if (!reducedMotion) {
  setTimeout(() => {
    globe.pointOfView({ lat: -3, lng: -76, altitude: 1.9 }, 2400);
  }, 600);
}
</script>

<!-- Música de fondo (control-musica.js maneja autoplay/mute) -->
<script src="{{ url_for('static', filename='js/control-musica.js') }}" defer></script>
</body>
