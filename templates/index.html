<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Sorpresa de Cumpleaños!</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styless.css') }}">
</head>
<body>
    <div id="escenaLuna" class="oculto-luna">
        <img id="planetaTierra" src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/22/Earth_Western_Hemisphere_transparent_background.png/600px-Earth_Western_Hemisphere_transparent_background.png" alt="Tierra">
        <div id="planetaLuna"></div>
        <h1 id="nombreLuna" class="nombre-luna oculto">Luna</h1>
        <div id="frasesPoeticas" class="frases-luna"></div>
    </div>

    <audio id="musicaFondo" loop><source src="{{ url_for('static', filename='cancion.mp3') }}" type="audio/mpeg"></audio>
    <audio id="musicaLuna" loop><source src="{{ url_for('static', filename='cancion_luna.mp3') }}" type="audio/mpeg"></audio>

    <div id="pantallaBloqueo" class="pantalla-bloqueo oculto">
        <h2>El regalo está protegido en una cápsula del tiempo ⏳</h2>
        <p>Se abrirá automáticamente en:</p>
        <div id="cuentaRegresiva" class="reloj-cuenta">--:--:--</div>
        <p>Vuelve cuando el contador llegue a cero.</p>
    </div>

    <div class="contenedor" id="contenedorPrincipal">
        <div class="caja-regalo" id="botonRegalo">
            <div id="tapaRegalo" class="icono-regalo">🎁</div>
            <div id="textoRegalo">Toca aquí para abrir tu regalo</div>
        </div>

        <div id="contenidoSorpresa" class="oculto">
            <div id="contenedorPastel" class="contenedor-pastel">
                <div id="velas" class="velas">
                    <div class="llama"></div><div class="llama"></div><div class="llama"></div>
                </div>
                <div id="pastel" class="pastel-animado">🎂</div>
                <p id="instruccionPastel" class="instruccion-pastel">¡Pasa el dedo sobre las velas para pedir un deseo!</p>
            </div>
            
            <h1 id="tituloMensaje"></h1>
            <p id="estadisticasAstro" class="estadisticas"></p>
            
            <div id="listaMensajes" class="mensajes"></div>
            <p id="firmaMensaje" class="firma oculto"></p>

            <div id="buzonSecreto" class="buzon oculto">
                <h3>Buzón Secreto 💌</h3>
                <p>¿Qué le dirías a Frank?</p>
                <textarea id="textoSecreto" placeholder="Escribe tu mensaje aquí..."></textarea>
                <button id="btnEnviarSecreto">Enviar mensaje</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
