<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi Luna</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,600&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="static/styless.css">
</head>
<body>
    <div id="cursor"></div>
    <div id="cursor-ring"></div>
    <div id="toast"></div>

    <audio id="musicaFondo" src="static/cancion.mp3" loop></audio>
    <audio id="musicaLuna" src="static/cancion_luna.mp3" loop></audio>

    <div id="pantallaBloqueo" class="pantalla-bloqueo oculto">
        <h1 style="font-family: 'Playfair Display', serif;">Falta poco para tu sorpresa...</h1>
        <div id="cuentaRegresiva" class="reloj-cuenta">00:00:00</div>
    </div>

    <div id="contenedorPrincipal" class="contenedor">
        <div id="botonRegalo" class="caja-regalo">
            <span class="icono-regalo">🎁</span>
            <span id="textoRegalo" style="font-weight: bold;">Toca para abrir tu sorpresa</span>
        </div>

        <div id="contenidoSorpresa" class="oculto">
            <div class="contenedor-pastel">
                <div class="velas">
                    <div class="llama"></div>
                    <div class="llama"></div>
                    <div class="llama"></div>
                </div>
                <div class="pastel-animado">🎂</div>
                <p id="instruccionPastel" class="instruccion-pastel">Sopla las velas (pasa el dedo/mouse)</p>
            </div>

            <h1 id="tituloMensaje" style="font-family: 'Playfair Display', serif; color: #ff6b81; font-size: 2.5rem;"></h1>
            <p id="estadisticasAstro" class="estadisticas"></p>
            
            <div id="listaMensajes" class="mensajes"></div>
            <p id="firmaMensaje" class="firma oculto"></p>

            <p id="firmaMensaje" class="firma oculto"></p>

            <div id="collageMemorias" class="oculto">
                <h3 style="font-family: 'Playfair Display', serif; color: #ff6b81; margin-top: 40px; font-size: 2rem;">Nuestra Historia</h3>
                <div class="galeria-grid">
                    <img src="/static/foto1.png" class="foto-cinematografica" alt="Recuerdo 1">
                    <img src="/static/foto2.png" class="foto-cinematografica" alt="Recuerdo 2">
                    <img src="/static/foto3.png" class="foto-cinematografica" alt="Recuerdo 3">
                    <img src="/static/foto4.png" class="foto-cinematografica" alt="Recuerdo 4">
                    <img src="/static/foto5.png" class="foto-cinematografica" alt="Recuerdo 5">
                </div>
            </div>

            <div id="buzonSecreto" class="buzon oculto">

            <div id="buzonSecreto" class="buzon oculto">
                <h3>Buzón Secreto 💌</h3>
                <p>Escribe algo aquí, solo yo podré leerlo después...</p>
                <textarea id="textoSecreto" placeholder="Escribe tu mensaje mágico aquí..."></textarea>
                <br>
                <button id="btnEnviarSecreto">Enviar a las estrellas</button>
                <br><br>
                <button id="btnMusicaSintetica" style="background: transparent; border: 1px solid #ffcc00; color: #ffcc00; border-radius: 20px; padding: 8px 15px; cursor: pointer; font-size: 0.9rem; transition: 0.3s;">🎵 Reproducir Melodía Mágica</button>
            </div>
        </div>
    </div>

    <div id="escenaLuna">
        <div class="capa-estrellas-lejos"></div>
        <div class="capa-estrellas-cerca"></div>
        <div class="nebulosa-fondo"></div>
        
        <div id="planetaTierra" class="planeta-tierra"></div>
        
        <div id="contenedorLuna" style="text-align: center; position: relative; z-index: 102;">
            <div class="luna-realista"></div>
            <h1 class="nombre-luna-titulo">LUNA</h1>
        </div>

        <div id="frasesPoeticas" class="frases-luna"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="static/script.js"></script>
</body>
</html>
